<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내과 질환 Q&A 챗봇</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .chat-container { width: 100%; max-width: 500px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; overflow: hidden; }
        
        .header { background-color: #333333; color: white; padding: 15px 20px; text-align: left; }
        .header h2 { margin: 0; font-size: 20px; }
        .header p { margin: 5px 0 0 0; font-size: 12px; color: #aaaaaa; }
        
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background-color: #ffffff; }
        
        .message { padding: 12px 16px; border-radius: 15px; max-width: 75%; line-height: 1.5; font-size: 14px; word-break: break-word; }
        
        .user-message { background-color: #e1ffc7; color: #000; align-self: flex-end; border-bottom-right-radius: 0; }
        
        .bot-message { background-color: #333333; color: white; align-self: flex-start; border-bottom-left-radius: 0; }
        
        .input-container { display: flex; border-top: 1px solid #eeeeee; padding: 15px; background-color: #f9f9f9; }
        .input-container input { flex: 1; padding: 12px; border: 1px solid #cccccc; border-radius: 8px; outline: none; font-size: 14px; transition: border 0.2s; }
        .input-container input:focus { border-color: #333333; }
        .input-container button { padding: 12px 20px; margin-left: 10px; background-color: #333333; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: background-color 0.2s; }
        .input-container button:hover { background-color: #555555; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2>내과 질환 Q&A 챗봇</h2>
        <p>EST 소프트</p>
    </div>
    <div class="chat-box" id="chat-box">
        <div class="message bot-message"><b>Bot:</b> 안녕하세요! 현재 어떤 상태인가요?.</div>
    </div>
    <div class="input-container">
        <input type="text" id="user-input" placeholder="메시지를 입력하세요..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">전송</button>
    </div>
</div>

<script>
    function appendMessage(sender, text) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message');
        msgDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');
        
        msgDiv.innerHTML = sender === 'user' ? text : `<b>Bot:</b> ${text}`;
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const message = inputField.value.trim();
        
        if (!message) return;

        appendMessage('user', message);
        inputField.value = ''; 

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            appendMessage('bot', data.response);
            
        } catch (error) {
            console.error('Error:', error);
            appendMessage('bot', '서버와 통신하는 중 오류가 발생했습니다.');
        }
    }
</script>

</body>
</html>
